name: Daily Financial Lines Briefing

on:
  schedule:
    # GitHub cron is UTC. Both times are scheduled; the Python time gate keeps 07:00 Europe/London across DST.
    - cron: "0 6 * * *"
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: daily-financial-lines-briefing
  cancel-in-progress: false

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt -e .
      - name: Research, generate and send briefing
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5.6-luna' }}
          GMAIL_USERNAME: ${{ secrets.GMAIL_USERNAME }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          ARTICLE_COUNT: "8"
          TIMEZONE: Europe/London
        run: python -m briefing.main

